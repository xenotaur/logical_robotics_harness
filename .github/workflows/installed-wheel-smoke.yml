name: Installed wheel smoke

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  installed-wheel-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build and smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" -c constraints-dev.txt

      - name: "Diagnostics: toolchain versions"
        run: scripts/version tools

      - name: Build artifacts and smoke-test installed wheel
        run: scripts/release-smoke --strict-isolation
