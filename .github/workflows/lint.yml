name: Lint and formatting checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" -c constraints-dev.txt

      - name: "Diagnostics: toolchain versions"
        run: scripts/version tools

      - name: "Format: Black check + diff"
        run: scripts/format --check --diff

      - name: Lint + format gate (scripts/lint)
        run: scripts/lint
