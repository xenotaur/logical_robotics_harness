name: TestPyPI rehearsal publish

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check-smoke:
    name: Build, check, and smoke-test artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TAG_UNDER_TEST: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate TestPyPI rehearsal tag
        run: |
          if [[ "${{ github.ref_type }}" != "tag" ]]; then
            echo "ERROR: TestPyPI rehearsals must run from a tag ref."
            echo "Use a vMAJOR.MINOR.PATCH tag such as v0.2.2, not a branch or untagged commit."
            exit 1
          fi
          if [[ ! "$TAG_UNDER_TEST" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: unsupported TestPyPI rehearsal tag: $TAG_UNDER_TEST"
            echo "Expected: vMAJOR.MINOR.PATCH (for example, v0.2.2)."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" -c constraints-dev.txt

      - name: "Diagnostics: toolchain versions"
        run: scripts/version tools

      - name: Build artifacts and smoke-test installed wheel
        run: scripts/release-smoke "$TAG_UNDER_TEST" --strict-isolation

      - name: Upload checked distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-rehearsal-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    name: Publish checked artifacts to TestPyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-check-smoke
    environment:
      name: testpypi
      url: https://test.pypi.org/project/lrh/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download checked distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: testpypi-rehearsal-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
